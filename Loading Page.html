<!DOCTYPE html>
<html class="light" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Vivaha Vedika | Loading...</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Hanken+Grotesk:wght@400;600&display=swap" rel="stylesheet"/>
<style>
    body {
        background-color: #4A3525; /* Deep warm brown similar to reference */
        margin: 0;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        color: #F5E6D3; /* Cream color */
    }
    
    .logo-container {
        position: relative;
        height: 150px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 60px;
    }

    /* We use a pseudo-element for the two-tone effect from the reference, or we can use SVG gradients/stroke */
    .drawing-text {
        font-family: 'Great Vibes', cursive;
        font-size: 100px;
        fill: transparent;
        stroke: #F5E6D3;
        stroke-width: 2px;
        stroke-dasharray: 1200;
        stroke-dashoffset: 1200;
        /* The animation draws the stroke, then fills it */
        animation: draw 2.5s ease-in-out forwards, fillText 0.8s 2s forwards ease-in-out;
    }

    @media (max-width: 640px) {
        .drawing-text {
            font-size: 60px;
        }
    }

    @keyframes draw {
        to {
            stroke-dashoffset: 0;
        }
    }

    @keyframes fillText {
        to {
            fill: #F5E6D3;
            stroke-width: 0;
        }
    }

    .progress-container {
        width: 120px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
    }

    .progress-text {
        font-family: 'Hanken Grotesk', sans-serif;
        font-size: 24px;
        font-weight: 600;
        letter-spacing: 1px;
    }

    .progress-bar-bg {
        width: 100%;
        height: 2px;
        background-color: rgba(245, 230, 211, 0.2);
        position: relative;
    }

    .progress-bar-fill {
        position: absolute;
        top: 0;
        left: 0;
        height: 100%;
        background-color: #F5E6D3;
        width: 0%;
        transition: width 0.1s linear;
    }
</style>
</head>
<body>

    <div class="logo-container">
        <svg width="600" height="150" viewBox="0 0 600 150" class="w-full max-w-[600px]">
            <text x="50%" y="60%" dominant-baseline="middle" text-anchor="middle" class="drawing-text">Vivaha Vedika</text>
        </svg>
    </div>

    <div class="progress-container">
        <div class="progress-text" id="progress-text">1%</div>
        <div class="progress-bar-bg">
            <div class="progress-bar-fill" id="progress-fill"></div>
        </div>
    </div>

    <script>
        // Progress bar logic matching the animation duration
        const duration = 2800; // 2.8 seconds total loading time
        const interval = 30; // update every 30ms
        const steps = duration / interval;
        let currentStep = 0;
        
        const progressText = document.getElementById('progress-text');
        const progressFill = document.getElementById('progress-fill');

        const loadingTimer = setInterval(() => {
            currentStep++;
            let percent = Math.min(Math.floor((currentStep / steps) * 100), 100);
            
            // Add a little easing to the percentage visually
            let displayPercent = percent;
            if (percent > 90) {
                // slow down at the end
                displayPercent = 90 + Math.floor((percent - 90) * (currentStep % 2));
                if (percent === 100) displayPercent = 100;
            }

            progressText.textContent = displayPercent + '%';
            progressFill.style.width = displayPercent + '%';

            if (percent >= 100) {
                clearInterval(loadingTimer);
                // Redirect to Home.html after a tiny pause at 100%
                setTimeout(() => {
                    window.location.href = 'Home.html';
                }, 400);
            }
        }, interval);
    </script>
</body>
</html>
